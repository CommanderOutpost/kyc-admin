services:
  db:
    image: postgres:16-alpine
    container_name: kyc_admin_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: kyc_admin
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kyc_admin"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend-api
    container_name: kyc_admin_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/kyc_admin?schema=public
      JWT_SECRET: supersecurejwtsecret123
      WEBHOOK_SECRET: supersecurewebhooksecret123
      BCRYPT_ROUNDS: 10
      AUTH_RATE_LIMIT_WINDOW_MS: 900000
      AUTH_RATE_LIMIT_MAX: 10
      DEFAULT_ADMIN_EMAIL: admin@fonu.test
      DEFAULT_ADMIN_PASSWORD: Password123
    command: sh -c "npm run prisma:generate && npm run prisma:deploy && npm run dev"
    ports:
      - "4000:4000"
    volumes:
      - ./backend-api:/app
      - backend_node_modules:/app/node_modules

  frontend:
    build:
      context: ./frontend
    container_name: kyc_admin_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:4000
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  pgdata:
  backend_node_modules:
  frontend_node_modules:
